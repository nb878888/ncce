syntax = "proto3";

package gamepb.mysteryshoppb;

service MysteryShopService {
  rpc GetActiveNPC(GetActiveNPCRequest) returns (GetActiveNPCReply);
  rpc Buy(BuyRequest) returns (BuyReply);
  rpc Abandon(AbandonRequest) returns (AbandonReply);
}

message GetActiveNPCRequest {}

message MysteryShopNPC {
  int32 npc_id = 1;
  int32 item_id = 2;
  int32 item_type = 3;
  int32 item_count = 4;
  int32 currency_id = 5;
  int64 price = 6;
  int32 discount = 7;
  bool purchased = 8;
  int64 original_price = 9;
}

message GetActiveNPCReply {
  bool active = 1;
  MysteryShopNPC npc = 2;
  int64 start_time = 3;
  int64 end_time = 4;
}

message BuyRequest {
  int32 npc_id = 1;
}

message MysteryShopReward {
  int32 item_id = 1;
  int32 count = 2;
  int32 field_6 = 6;
  int32 field_9 = 9;
}

message BuyReply {
  MysteryShopReward reward = 1;
  MysteryShopNPC npc = 2;
}

message AbandonRequest {}

message AbandonReply {}
